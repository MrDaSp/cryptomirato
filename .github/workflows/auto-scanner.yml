name: CryptoMirato Auto Scanner

on:
  schedule:
    - cron: '*/30 * * * *' # Ogni 30 minuti
  workflow_dispatch: # Permette avvio manuale

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy pandas

    - name: Run CryptoMirato Scanner
      env:
        COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      run: python scanner.py

    - name: Commit and push changes
      run: |
        git config --global user.name "CryptoMirato Bot"
        git config --global user.email "bot@cryptomirato.local"
        git add crypto_data.json DIARIO_DI_BORDO.md
        git commit -m "🤖 Auto-Update: Dati CryptoMirato" || exit 0
        git push origin main
